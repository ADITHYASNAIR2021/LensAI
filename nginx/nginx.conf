user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffer sizes
    client_body_buffer_size     16k;
    client_header_buffer_size   1k;
    client_max_body_size        10m;
    large_client_header_buffers 4 8k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Rate limiting zones
    # Primary zone: 10 requests/second per IP, 20-request burst
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Stricter zone for auth endpoints: 5 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn addr 20;

    # CORS map: allow only chrome-extension:// origins
    map $http_origin $cors_origin {
        default                              "";
        "~^chrome-extension://[a-z]{32}$"   $http_origin;
        # Allow local dev origins (remove in strict prod)
        "http://localhost:3000"             "http://localhost:3000";
        "http://localhost:8000"             "http://localhost:8000";
    }

    # Upstream definition
    upstream lensai_api {
        server api:8000;
        keepalive 32;
    }

    # -----------------------------------------------------------------------
    # HTTP -> HTTPS redirect
    # -----------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name api.lensai.app;

        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------------------------------------------------------
    # HTTPS — main API server
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.lensai.app;

        # -------------------------------------------------------------------
        # SSL / TLS (Let's Encrypt via Certbot)
        # -------------------------------------------------------------------
        ssl_certificate     /etc/letsencrypt/live/api.lensai.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.lensai.app/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/api.lensai.app/chain.pem;

        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # -------------------------------------------------------------------
        # Security headers
        # -------------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

        # -------------------------------------------------------------------
        # CORS for chrome-extension:// origins
        # -------------------------------------------------------------------
        # Preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID, X-User-ID" always;
            add_header Access-Control-Max-Age       86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # -------------------------------------------------------------------
        # Health check (no rate limit, no auth required)
        # -------------------------------------------------------------------
        location = /health {
            proxy_pass http://lensai_api;
            proxy_set_header Host $host;
            access_log off;
        }

        # -------------------------------------------------------------------
        # Auth endpoints — stricter rate limit
        # -------------------------------------------------------------------
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass         http://lensai_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        }

        # -------------------------------------------------------------------
        # SSE streaming endpoints (analyze, translate)
        # Disable buffering entirely so tokens reach the client immediately.
        # -------------------------------------------------------------------
        location ~ ^/api/v1/(analyze|translate) {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass             http://lensai_api;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_set_header       Connection        "";

            # SSE / streaming — critical settings
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
            proxy_connect_timeout  10s;
            keepalive_timeout      3600s;
            chunked_transfer_encoding on;

            # SSE content-type pass-through
            proxy_set_header Accept-Encoding "";

            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID" always;
            add_header X-Accel-Buffering "no" always;
            add_header Cache-Control "no-cache" always;
        }

        # -------------------------------------------------------------------
        # All other API endpoints
        # -------------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://lensai_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
            proxy_connect_timeout 10s;

            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 16k;

            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID, X-User-ID" always;
        }

        # -------------------------------------------------------------------
        # Block anything that isn't /api/ or /health
        # -------------------------------------------------------------------
        location / {
            return 404;
        }

        # Custom error pages
        error_page 429 /429.json;
        location = /429.json {
            internal;
            return 429 '{"detail":"Too many requests. Please slow down."}';
            add_header Content-Type application/json;
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            return 503 '{"detail":"Service temporarily unavailable."}';
            add_header Content-Type application/json;
        }
    }
}
