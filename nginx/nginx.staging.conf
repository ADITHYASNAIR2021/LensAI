user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  512;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens off;

    client_max_body_size  10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain application/javascript text/css;

    # Relaxed rate limits for staging — easier debugging
    limit_req_zone $binary_remote_addr zone=staging_api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=staging_auth:10m rate=30r/m;
    limit_req_status 429;

    # Allow chrome-extension origins AND the staging web UI during testing
    map $http_origin $cors_origin {
        default                              "";
        "~^chrome-extension://[a-z]{32}$"   $http_origin;
        "http://localhost:3000"              "http://localhost:3000";
        "https://staging.lensai.app"         "https://staging.lensai.app";
    }

    upstream lensai_staging_api {
        server api:8000;
        keepalive 16;
    }

    # -----------------------------------------------------------------------
    # HTTP -> HTTPS redirect
    # -----------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name staging-api.lensai.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -----------------------------------------------------------------------
    # HTTPS — staging API server
    # -----------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name staging-api.lensai.app;

        ssl_certificate     /etc/letsencrypt/live/staging-api.lensai.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staging-api.lensai.app/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/staging-api.lensai.app/chain.pem;

        ssl_session_cache   shared:SSL:5m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Staging-specific header so you can always tell where a request landed
        add_header X-Environment "staging" always;
        add_header Strict-Transport-Security "max-age=3600" always;   # Short HSTS for staging
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        # -----------------------------------------------------------------------
        # Health check
        # -----------------------------------------------------------------------
        location = /health {
            proxy_pass http://lensai_staging_api;
            proxy_set_header Host $host;
            access_log off;
        }

        # -----------------------------------------------------------------------
        # Auth endpoints
        # -----------------------------------------------------------------------
        location /api/v1/auth/ {
            limit_req zone=staging_auth burst=20 nodelay;

            proxy_pass         http://lensai_staging_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        }

        # -----------------------------------------------------------------------
        # SSE streaming (analyze, translate) — no buffering
        # -----------------------------------------------------------------------
        location ~ ^/api/v1/(analyze|translate) {
            limit_req zone=staging_api burst=30 nodelay;

            proxy_pass             http://lensai_staging_api;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_set_header       Connection        "";

            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
            chunked_transfer_encoding on;
            proxy_set_header Accept-Encoding "";

            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID" always;
            add_header X-Accel-Buffering "no" always;
            add_header Cache-Control "no-cache" always;
        }

        # -----------------------------------------------------------------------
        # Swagger UI — exposed in staging, blocked in production
        # -----------------------------------------------------------------------
        location /docs {
            proxy_pass         http://lensai_staging_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass         http://lensai_staging_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # -----------------------------------------------------------------------
        # All other API endpoints
        # -----------------------------------------------------------------------
        location /api/ {
            limit_req zone=staging_api burst=30 nodelay;

            proxy_pass         http://lensai_staging_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout    60s;

            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID, X-User-ID" always;
        }

        location / {
            return 404;
        }

        error_page 429 /429.json;
        location = /429.json {
            internal;
            return 429 '{"detail":"Rate limit exceeded."}';
            add_header Content-Type application/json;
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            return 503 '{"detail":"Service temporarily unavailable."}';
            add_header Content-Type application/json;
        }
    }
}
