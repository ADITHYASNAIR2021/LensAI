name: CI — Test & Lint

# Runs on every push/PR except the deployment branches (they have their own full pipelines)
on:
  push:
    branches-ignore:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend — pytest
  # ──────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lensai_test
          POSTGRES_PASSWORD: lensai_test
          POSTGRES_DB: lensai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lensai_test -d lensai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://lensai_test:lensai_test@localhost:5432/lensai_test
      REDIS_URL: redis://localhost:6379/0
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: test
      DEBUG: "false"
      ALLOWED_ORIGINS: "*"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --asyncio-mode=auto \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # Extension — TypeScript compile check
  # ──────────────────────────────────────────────────────────────────────────
  check-extension:
    name: Extension TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

  # ──────────────────────────────────────────────────────────────────────────
  # Landing — Next.js build check
  # ──────────────────────────────────────────────────────────────────────────
  check-landing:
    name: Landing page build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://staging-api.lensai.app
