name: Staging — Build & Deploy

# Triggers when code is pushed to the staging branch (pre-production environment)
on:
  push:
    branches:
      - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: staging-deploy
  cancel-in-progress: true   # Only one staging deploy at a time

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Run full test suite before deploying
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lensai_test
          POSTGRES_PASSWORD: lensai_test
          POSTGRES_DB: lensai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lensai_test -d lensai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://lensai_test:lensai_test@localhost:5432/lensai_test
      REDIS_URL: redis://localhost:6379/0
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: testing
      DEBUG: "false"
      ALLOWED_ORIGINS: '["*"]'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --asyncio-mode=auto \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend-staging
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build Docker image and push to GHCR (staging tag)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & push staging image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=staging
          cache-to: type=gha,mode=max,scope=staging
          platforms: linux/amd64
          provenance: false

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to staging server
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging
      url: https://staging-api.lensai.app/health

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.STAGING_SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy staging compose and nginx files
        run: |
          scp docker-compose.staging.yml \
            "${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}:~/lensai-staging/docker-compose.staging.yml"
          scp nginx/nginx.staging.conf \
            "${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}:~/lensai-staging/nginx/nginx.conf"

      - name: Pull and restart staging services
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ssh "${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}" << 'ENDSSH'
            set -euo pipefail
            cd ~/lensai-staging

            echo "${{ secrets.GHCR_TOKEN }}" \
              | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            export IMAGE_TAG="staging"
            export GITHUB_REPOSITORY="${{ github.repository }}"

            docker compose -f docker-compose.staging.yml pull api
            docker compose -f docker-compose.staging.yml up -d --remove-orphans
            docker image prune -f
          ENDSSH

      - name: Verify staging health
        run: |
          echo "Waiting 30s for staging services to start..."
          sleep 30
          curl --fail --silent --max-time 15 \
            https://staging-api.lensai.app/health \
            || (echo "Staging health check failed!" && exit 1)
          echo "Staging deployment verified."

      - name: Notify on failure
        if: failure()
        run: echo "::error::Staging deployment failed — check deploy-staging job logs."
