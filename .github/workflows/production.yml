name: Production — Build & Deploy

# Triggers when code is merged/pushed to main (production)
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: production-deploy
  cancel-in-progress: false   # Never cancel a production deploy mid-flight

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Full test suite (required before any production deploy)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Run tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lensai_test
          POSTGRES_PASSWORD: lensai_test
          POSTGRES_DB: lensai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U lensai_test -d lensai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://lensai_test:lensai_test@localhost:5432/lensai_test
      REDIS_URL: redis://localhost:6379/0
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: test
      DEBUG: "false"
      ALLOWED_ORIGINS: "*"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --asyncio-mode=auto \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend-production
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build Docker image and push to GHCR (versioned production tags)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build & push production image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=production
          cache-to: type=gha,mode=max,scope=production
          platforms: linux/amd64
          provenance: false

      - name: Output image digest
        run: echo "Built ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to production (requires manual approval via GitHub Environment)
  #
  # Set up in GitHub: Settings → Environments → production
  #   - Add required reviewers (yourself)
  #   - This pauses the workflow until you approve in the GitHub UI
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://api.lensai.app/health

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy production compose and nginx files
        run: |
          scp backend/docker-compose.prod.yml \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/lensai/docker-compose.prod.yml"
          scp nginx/nginx.conf \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/lensai/nginx/nginx.conf"

      - name: Pull and restart production services
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ssh "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'ENDSSH'
            set -euo pipefail
            cd ~/lensai

            echo "${{ secrets.GHCR_TOKEN }}" \
              | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            export IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
            export GITHUB_REPOSITORY="${{ github.repository }}"

            # Run database migrations before restarting the API
            docker compose -f docker-compose.prod.yml run --rm api \
              alembic upgrade head

            # Pull and do a rolling restart
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Reclaim disk space
            docker image prune -f
          ENDSSH

      - name: Verify production health
        run: |
          echo "Waiting 30s for services to stabilise..."
          sleep 30
          curl --fail --silent --max-time 15 \
            https://api.lensai.app/health \
            || (echo "Health check failed! Rolling back may be required." && exit 1)
          echo "Production deployment verified successfully."

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${{ needs.build.outputs.image_digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Health:** https://api.lensai.app/health" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deployment failed — check deploy-production job logs."
          echo "Manual rollback: ssh to server → cd ~/lensai → docker compose -f docker-compose.prod.yml up -d"
