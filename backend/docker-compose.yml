services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override only Docker-internal service URLs — all API keys come from .env via env_file
      - DATABASE_URL=postgresql+asyncpg://lensai:lensai@db:5432/lensai
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - ALLOWED_ORIGINS=["http://localhost:3000","http://localhost:5173","https://lensai.app"]
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lensai
      POSTGRES_PASSWORD: lensai
      POSTGRES_DB: lensai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
